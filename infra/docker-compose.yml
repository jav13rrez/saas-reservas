# Local development dependencies (ADR-0007). Apps and services run on the host.
#
#   docker compose -f infra/docker-compose.yml up -d
name: saas-reservas

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saas_admin
      POSTGRES_PASSWORD: saas_admin
      POSTGRES_DB: saas_reservas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Ordered SQL migrations applied on first boot of an empty data dir.
      - ./postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_admin -d saas_reservas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: saas-minio
      MINIO_ROOT_PASSWORD: saas-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  minio-data:
