name: CI

# Runs the same checks we run by hand, automatically on every push to main and
# on every pull request. A red check here means the PR should not be merged.
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · format · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from the "packageManager" field in package.json.
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Tests
        # Postgres/Redis-backed integration suites self-skip when those services
        # are absent (no service containers needed for v1).
        run: pnpm test

      - name: Build apps
        run: pnpm -r --filter "./apps/*" build
